<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="Inter, Helvetica, Arial, sans-serif">
  <!-- Fond -->
  <rect width="1100" height="520" fill="#0F1F3D"/>

  <!-- Titre principal -->
  <text x="40" y="44" font-size="22" font-weight="700" fill="#FFFFFF">Pourquoi les petits nombres dessinent des courbes,</text>
  <text x="40" y="72" font-size="22" font-weight="700" fill="#FFFFFF">et les grands nombres un nuage</text>

  <!-- Axe principal -->
  <line x1="60" y1="440" x2="1060" y2="440" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="60" y1="100" x2="60" y2="440" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Label axes -->
  <text x="560" y="475" text-anchor="middle" font-size="13" fill="#FFFFFF">Population de la commune (échelle logarithmique) →</text>
  <text x="32" y="270" text-anchor="middle" font-size="13" fill="#FFFFFF" transform="rotate(-90 32 270)">Taux d'événements pour 1 000 habitants</text>

  <!-- Ticks -->
  <g font-size="10" fill="#FFFFFF" text-anchor="middle" opacity="0.7">
    <text x="170" y="458">100 hab.</text>
    <text x="370" y="458">1 000 hab.</text>
    <text x="610" y="458">10 000 hab.</text>
    <text x="850" y="458">100 000 hab.</text>
    <text x="1020" y="458">1 M</text>
  </g>

  <!-- Ligne séparatrice symbolique -->
  <line x1="490" y1="100" x2="490" y2="440" stroke="#FFFFFF" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>

  <!-- ZONE GAUCHE : empreinte digitale (courbes) -->
  <!-- Plusieurs arcs hyperboliques : taux = N/pop, pour N=1,2,3...10 -->
  <g fill="#FF6B6B" opacity="0.6">
    <!-- Courbe N=1 -->
    <circle cx="100" cy="120" r="2"/><circle cx="115" cy="160" r="2"/><circle cx="135" cy="200" r="2"/><circle cx="160" cy="240" r="2"/><circle cx="195" cy="275" r="2"/><circle cx="240" cy="305" r="2"/><circle cx="290" cy="330" r="2"/><circle cx="345" cy="350" r="2"/><circle cx="405" cy="370" r="2"/><circle cx="465" cy="385" r="2"/>
    <!-- Courbe N=2 -->
    <circle cx="120" cy="125" r="2"/><circle cx="140" cy="170" r="2"/><circle cx="170" cy="210" r="2"/><circle cx="205" cy="250" r="2"/><circle cx="245" cy="285" r="2"/><circle cx="295" cy="315" r="2"/><circle cx="350" cy="335" r="2"/><circle cx="410" cy="355" r="2"/>
    <!-- Courbe N=3 -->
    <circle cx="135" cy="135" r="2"/><circle cx="160" cy="180" r="2"/><circle cx="195" cy="220" r="2"/><circle cx="235" cy="260" r="2"/><circle cx="285" cy="290" r="2"/><circle cx="340" cy="320" r="2"/>
  </g>
  <g fill="#FFB347" opacity="0.5">
    <!-- Continuation et autres courbes -->
    <circle cx="105" cy="140" r="2"/><circle cx="130" cy="190" r="2"/><circle cx="155" cy="230" r="2"/><circle cx="190" cy="265" r="2"/><circle cx="230" cy="295" r="2"/><circle cx="280" cy="325" r="2"/><circle cx="335" cy="345" r="2"/>
    <circle cx="125" cy="155" r="2"/><circle cx="155" cy="200" r="2"/><circle cx="190" cy="240" r="2"/><circle cx="225" cy="275" r="2"/><circle cx="270" cy="305" r="2"/><circle cx="320" cy="330" r="2"/>
    <circle cx="145" cy="175" r="2"/><circle cx="180" cy="220" r="2"/><circle cx="215" cy="255" r="2"/><circle cx="255" cy="290" r="2"/>
    <circle cx="115" cy="180" r="2"/><circle cx="145" cy="225" r="2"/><circle cx="180" cy="265" r="2"/><circle cx="220" cy="300" r="2"/>
  </g>
  <g fill="#FFE194" opacity="0.4">
    <circle cx="170" cy="265" r="2"/><circle cx="205" cy="300" r="2"/><circle cx="245" cy="330" r="2"/><circle cx="295" cy="350" r="2"/>
    <circle cx="195" cy="305" r="2"/><circle cx="235" cy="335" r="2"/><circle cx="285" cy="360" r="2"/>
    <circle cx="220" cy="345" r="2"/><circle cx="270" cy="370" r="2"/><circle cx="320" cy="385" r="2"/>
    <circle cx="260" cy="380" r="2"/><circle cx="310" cy="395" r="2"/>
    <circle cx="350" cy="400" r="2"/><circle cx="400" cy="410" r="2"/>
  </g>

  <!-- ZONE DROITE : nuage météorologique -->
  <!-- ~120 points distribués aléatoirement autour d'un taux moyen ~5/1000 -->
  <g fill="#4A9EBD" opacity="0.5">
    <!-- Points dispersés autour de y=380 (taux ~5‰) -->
    <circle cx="510" cy="385" r="2"/><circle cx="525" cy="375" r="2"/><circle cx="545" cy="390" r="2"/><circle cx="560" cy="370" r="2"/><circle cx="580" cy="385" r="2"/><circle cx="600" cy="380" r="2"/><circle cx="620" cy="395" r="2"/><circle cx="640" cy="375" r="2"/><circle cx="660" cy="385" r="2"/><circle cx="680" cy="380" r="2"/><circle cx="700" cy="370" r="2"/><circle cx="720" cy="390" r="2"/><circle cx="740" cy="385" r="2"/><circle cx="760" cy="380" r="2"/><circle cx="780" cy="375" r="2"/><circle cx="800" cy="385" r="2"/><circle cx="820" cy="380" r="2"/><circle cx="840" cy="385" r="2"/><circle cx="860" cy="375" r="2"/><circle cx="880" cy="380" r="2"/><circle cx="900" cy="385" r="2"/><circle cx="920" cy="380" r="2"/><circle cx="940" cy="375" r="2"/><circle cx="960" cy="385" r="2"/><circle cx="980" cy="380" r="2"/><circle cx="1000" cy="385" r="2"/><circle cx="1020" cy="380" r="2"/>
    <circle cx="515" cy="395" r="2"/><circle cx="535" cy="395" r="2"/><circle cx="555" cy="400" r="2"/><circle cx="575" cy="395" r="2"/><circle cx="595" cy="400" r="2"/><circle cx="615" cy="395" r="2"/><circle cx="635" cy="395" r="2"/><circle cx="655" cy="400" r="2"/><circle cx="675" cy="395" r="2"/><circle cx="695" cy="400" r="2"/><circle cx="715" cy="395" r="2"/><circle cx="735" cy="400" r="2"/><circle cx="755" cy="395" r="2"/><circle cx="775" cy="400" r="2"/><circle cx="795" cy="395" r="2"/><circle cx="815" cy="400" r="2"/><circle cx="835" cy="395" r="2"/><circle cx="855" cy="400" r="2"/><circle cx="875" cy="395" r="2"/><circle cx="895" cy="400" r="2"/><circle cx="915" cy="395" r="2"/><circle cx="935" cy="400" r="2"/><circle cx="955" cy="395" r="2"/><circle cx="975" cy="400" r="2"/><circle cx="995" cy="395" r="2"/><circle cx="1015" cy="400" r="2"/>
    <circle cx="520" cy="365" r="2"/><circle cx="540" cy="360" r="2"/><circle cx="565" cy="360" r="2"/><circle cx="585" cy="365" r="2"/><circle cx="610" cy="360" r="2"/><circle cx="630" cy="365" r="2"/><circle cx="650" cy="360" r="2"/><circle cx="670" cy="365" r="2"/><circle cx="690" cy="360" r="2"/><circle cx="710" cy="365" r="2"/><circle cx="730" cy="360" r="2"/><circle cx="750" cy="365" r="2"/><circle cx="770" cy="360" r="2"/><circle cx="790" cy="365" r="2"/><circle cx="810" cy="360" r="2"/><circle cx="830" cy="365" r="2"/><circle cx="850" cy="360" r="2"/><circle cx="870" cy="365" r="2"/><circle cx="890" cy="360" r="2"/><circle cx="910" cy="365" r="2"/><circle cx="930" cy="360" r="2"/><circle cx="950" cy="365" r="2"/><circle cx="970" cy="360" r="2"/><circle cx="990" cy="365" r="2"/>
    <circle cx="530" cy="345" r="2"/><circle cx="570" cy="350" r="2"/><circle cx="610" cy="345" r="2"/><circle cx="650" cy="350" r="2"/><circle cx="690" cy="345" r="2"/><circle cx="730" cy="350" r="2"/><circle cx="770" cy="345" r="2"/><circle cx="810" cy="350" r="2"/><circle cx="850" cy="345" r="2"/><circle cx="890" cy="350" r="2"/><circle cx="930" cy="345" r="2"/><circle cx="970" cy="350" r="2"/>
    <circle cx="550" cy="410" r="2"/><circle cx="590" cy="415" r="2"/><circle cx="630" cy="410" r="2"/><circle cx="670" cy="415" r="2"/><circle cx="710" cy="410" r="2"/><circle cx="750" cy="415" r="2"/><circle cx="790" cy="410" r="2"/><circle cx="830" cy="415" r="2"/><circle cx="870" cy="410" r="2"/><circle cx="910" cy="415" r="2"/><circle cx="950" cy="410" r="2"/>
  </g>

  <!-- Légende ZONE GAUCHE -->
  <g>
    <rect x="100" y="105" width="280" height="64" rx="6" fill="#1F4E79" opacity="0.85"/>
    <text x="115" y="127" font-size="13" font-weight="700" fill="#FFFFFF">PETITS NOMBRES</text>
    <text x="115" y="145" font-size="11" fill="#FFFFFF" opacity="0.85">Le hasard d'un seul événement</text>
    <text x="115" y="160" font-size="11" fill="#FFFFFF" opacity="0.85">dessine des courbes : structure prévisible.</text>
  </g>

  <!-- Légende ZONE DROITE -->
  <g>
    <rect x="720" y="290" width="280" height="64" rx="6" fill="#1F4E79" opacity="0.85"/>
    <text x="735" y="312" font-size="13" font-weight="700" fill="#FFFFFF">GRANDS NOMBRES</text>
    <text x="735" y="330" font-size="11" fill="#FFFFFF" opacity="0.85">Le taux se stabilise autour de la moyenne :</text>
    <text x="735" y="345" font-size="11" fill="#FFFFFF" opacity="0.85">nuage diffus, signal sociologique fiable.</text>
  </g>

  <!-- Flèches de pointage -->
  <g stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.5">
    <path d="M 240 175 Q 230 220 220 250" stroke-dasharray="3 3"/>
    <path d="M 850 290 Q 870 320 880 360" stroke-dasharray="3 3"/>
  </g>

  <!-- Source -->
  <text x="40" y="500" font-size="10" fill="#FFFFFF" opacity="0.5">Schéma : Sacha Zaouati — illustration du principe statistique appliqué à la délinquance communale française</text>
</svg>
